name: grant-radar-digest

on:
  schedule:
    # Раз в неделю, понедельник 06:00 UTC (09:00 МСК). Шлёт накопленный дайджест.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}   # кнопка "Run workflow" для ручной отправки дайджеста

permissions:
  contents: write         # чтобы коммитить очищенный pending.json

concurrency:
  # Тот же group, что и у сканера — чтобы не гонять push одновременно.
  group: grant-radar
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python radar.py --flush

      - name: Commit state
        run: |
          git config user.name  "grant-radar-bot"
          git config user.email "actions@github.com"
          git add pending.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "flush digest queue [skip ci]"
          git push
