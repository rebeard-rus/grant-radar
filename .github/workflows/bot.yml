name: grant-radar-bot

on:
  # РАСПИСАНИЕ ОТКЛЮЧЕНО. Бот теперь работает постоянным процессом
  # (python radar.py --serve, см. run-bot.sh) — ответы за секунды.
  # Нельзя держать два опросчика getUpdates на одном токене одновременно:
  # если запустишь --serve, НЕ включай этот крон обратно (будет конфликт).
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}   # оставлен только ручной запуск (резерв)

permissions:
  contents: write         # чтобы коммитить bot_state.json (offset getUpdates)

concurrency:
  # Отдельная группа: опрос бота не должен ждать сканер и наоборот.
  group: grant-radar-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Poll and answer
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python radar.py --poll

      - name: Commit bot offset
        run: |
          git config user.name  "grant-radar-bot"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add -A
          git diff --staged --quiet || git commit -m "update bot offset [skip ci]"
          git push
